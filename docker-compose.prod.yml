services:
  web:
    build:
      context: .
    container_name: plumber-django-prod
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "0"
    ports:
      - "8013:8000"
    volumes:
      - media_data:/app/media
    restart: unless-stopped

volumes:
  media_data:
